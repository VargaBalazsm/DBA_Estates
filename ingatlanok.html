<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBA Estates - Eladó Ingatlanok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <div id="navbar"></div>

    <section class="bg-light py-5 border-bottom">
        <div class="container">
            <h1 class="fw-bold mb-4 text-primary">Ingatlanok keresése</h1>

            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Település</label>
                    <input type="text" id="search-telepules" class="form-control" placeholder="Pl.: Budapest">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Típus</label>
                    <select id="search-tipus" class="form-select">
                        <option value="">Mind</option>
                        <option value="ház">Családi ház</option>
                        <option value="lakás">Lakás</option>
                        <option value="telek">Telek</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Max. ár (Ft)</label>
                    <input type="number" id="search-ar" class="form-control" placeholder="Pl.: 50000000">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Min. szobák</label>
                    <input type="number" id="search-szobak" class="form-control" placeholder="Pl.: 3">
                </div>
                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button class="btn btn-primary w-100" onclick="kereses()">
                        <i data-lucide="search" class="me-1"></i> Keresés
                    </button>
                    <button class="btn btn-outline-secondary" onclick="szuresReset()" title="Szűrők törlése">
                        <i data-lucide="x">Visszaállítás</i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <div class="d-flex gap-2 align-items-center">
                    <span class="text-muted">Rendezés:</span>
                    <select id="rendezes" class="form-select form-select-sm w-auto" onchange="rendezesValtas()">
                        <option value="ar-novekvo">Ár szerint növekvő</option>
                        <option value="ar-csokkeno">Ár szerint csökkenő</option>
                        <option value="terulet-novekvo">Méret szerint növekvő</option>
                        <option value="terulet-csokkeno">Méret szerint csökkenő</option>
                        <option value="datum">Dátum szerint</option>
                    </select>
                </div>
                <span class="text-muted">Találatok: <strong id="talalat-szam">0</strong> db</span>
            </div>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <div id="ingatlan-lista" class="row g-4"></div>
            <div id="nincs-talalat" class="text-center py-5 d-none">
                <i data-lucide="home-x" class="display-1 text-muted mb-3"></i>
                <h3>Nincs találat</h3>
                <p class="text-muted">Módosítsa a keresési feltételeket vagy adjon fel új hirdetést.</p>
                <a href="uj-ingatlan.html" class="btn btn-primary">Hirdetés feladása</a>
            </div>
        </div>
    </section>

    <div class="modal fade" id="torlesModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-5">
                    <i data-lucide="trash-2" class="display-1 text-danger mb-3"></i>
                    <h3 class="fw-bold mb-3">Biztosan törölni szeretné?</h3>
                    <p class="text-muted mb-4" id="torlesModalText"></p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button id="confirmDeleteBtn" class="btn btn-danger">Törlés megerősítése</button>
                        <button class="btn btn-outline-secondary" data-bs-dismiss="modal"
                            aria-label="Close">Mégsem</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
