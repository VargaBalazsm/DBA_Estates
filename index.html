<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBA Estates - Kezdőlap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="navbar"></div>


    <header class="hero-section text-white text-center d-flex align-items-center" style="min-height: 60vh; background-image: 
  linear-gradient(rgba(0,0,0,0.5), rgba(0, 0, 0, 0.884)),
  url(img/haz5.jpg);">
        <div class="container">
            <h1 class="display-4 fw-bold mb-4">Találja meg álmai otthonát</h1>
            <p class="lead mb-4">Több száz hirdetés közül válogathat modern lakások és családi házak közül.</p>
            <a href="ingatlanok.html" class="btn btn-light btn-lg fw-bold">Böngésszen most</a>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-primary">Kiemelt ajánlatok</h2>
                <a href="ingatlanok.html" class="btn btn-outline-primary">Összes ingatlan</a>
            </div>
            <div id="kiemelt-ingatlanok" class="row g-4 text-center">
                <div class="py-5 w-100">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Betöltés...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5 bg-primary text-white">
        <div class="container">
            <div class="row text-center g-4">
                <div class="col-md-3">
                    <h3 class="display-4 fw-bold" id="talalat-szam">0</h3>
                    <p>Aktív hirdetés</p>
                </div>
                <div class="col-md-3">
                    <h3 class="display-4 fw-bold">150+</h3>
                    <p>Eladott ingatlan</p>
                </div>
                <div class="col-md-3">
                    <h3 class="display-4 fw-bold">98%</h3>
                    <p>Elégedett ügyfél</p>
                </div>
                <div class="col-md-3">
                    <h3 class="display-4 fw-bold">24</h3>
                    <p>Órás ügyfélszolgálat</p>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
